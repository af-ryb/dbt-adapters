kind: Under the Hood
body: 'table_partitions materialization: read selector_update_range, min_start_date
  and default_start_date from config.meta instead of top-level config keys. This
  avoids dbt-core CustomKeyInConfigDeprecation (D026) for these custom keys, and
  reading them straight from meta (never config.get) also avoids the meta_get
  nudge warning'
